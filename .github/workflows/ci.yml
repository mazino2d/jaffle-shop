name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      ci_relevant: ${{ steps.filter.outputs.ci_relevant }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ci_relevant:
              - "dbt/**"
              - "dlt/**"
              - "dag/**"
              - "pyproject.toml"
              - ".pre-commit-config.yaml"
              - ".github/workflows/ci.yml"

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.ci_relevant == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install dbt packages
        working-directory: dbt
        run: dbt deps --profiles-dir .

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  dbt-build:
    name: dbt build
    needs: changes
    if: needs.changes.outputs.ci_relevant == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install dbt packages
        working-directory: dbt
        run: dbt deps --profiles-dir .

      - name: Compile dbt manifest
        working-directory: dbt
        run: dbt compile --profiles-dir .

      - name: Run full pipeline (ingest → snapshot → build)
        run: dagster asset materialize -m dag.definitions --select "*"

  ci-pass:
    name: CI pass
    runs-on: ubuntu-latest
    needs: [lint, dbt-build]
    if: always()
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || "${{ needs.dbt-build.result }}" == "failure" ]]; then
            exit 1
          fi
