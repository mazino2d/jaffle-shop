name: snapshots
description: "Run SCD Type 2 snapshots for customers, orders, and products."
dbt_selector: "resource_type:snapshot"

trigger:
  type: asset_sensor  # auto-triggers when raw_ingestion assets materialize
  depends_on: raw_ingestion

catchup:
  enabled: true
  start_date: "2024-01-01"

retry:
  max_retries: 2
  retry_delay_minutes: 5
