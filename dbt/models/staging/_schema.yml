version: 2

models:
  - name: stg_customers
    description: >
      All historical versions of each customer with surrogate keys.
      sk is unique per version; master_sk is stable for the entity lifetime.
      Use is_current = TRUE to get the current state.
    columns:
      - name: sk
        description: "Surrogate key — unique per customer version (= dbt_scd_id)."
        tests: [unique, not_null]
      - name: master_sk
        description: "Stable entity key — same across all versions of the same customer."
        tests: [not_null]
      - name: customer_id
        description: "Source natural key (may change on backend ID migration)."
        tests: [not_null]
      - name: is_current
        tests: [not_null]
      - name: email
        tests: [not_null]
      - name: status
        tests:
          - accepted_values:
              values: ["active", "churned", "at_risk"]

  - name: stg_products
    description: >
      All historical versions of each product with surrogate keys.
      sk is unique per version; master_sk is stable for the entity lifetime.
    columns:
      - name: sk
        description: "Surrogate key — unique per product version."
        tests: [unique, not_null]
      - name: master_sk
        description: "Stable entity key."
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: is_current
        tests: [not_null]
      - name: price
        tests: [not_null]

  - name: stg_orders
    description: >
      All historical versions of each order with surrogate keys.
      sk is unique per version; master_sk is stable for the entity lifetime.
    columns:
      - name: sk
        description: "Surrogate key — unique per order version."
        tests: [unique, not_null]
      - name: master_sk
        description: "Stable entity key."
        tests: [not_null]
      - name: order_id
        tests: [not_null]
      - name: customer_id
        tests: [not_null]
      - name: is_current
        tests: [not_null]
      - name: status
        tests:
          - accepted_values:
              values: ["placed", "shipped", "completed", "returned"]

  - name: stg_payments
    description: "Cleaned payment events (incremental from raw log)."
    columns:
      - name: payment_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: payment_status
        tests:
          - accepted_values:
              values: ["success", "failed", "refunded"]

  - name: stg_order_items
    description: "Cleaned order line items (incremental from raw log)."
    columns:
      - name: order_item_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
