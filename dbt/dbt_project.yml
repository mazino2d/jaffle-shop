name: jaffle_shop
version: "1.0.0"
config-version: 2

profile: jaffle_shop

model-paths: ["models"]
snapshot-paths: ["snapshots"]
test-paths: ["tests"]
seed-paths: ["seeds"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  jaffle_shop:
    staging:
      +materialized: view
      +tags: ["staging"]
    intermediate:
      +materialized: view
      +tags: ["intermediate"]
    marts:
      core:
        +materialized: table
        +tags: ["core"]
      features:
        +materialized: table
        +tags: ["features"]

snapshots:
  jaffle_shop:
    +tags: ["snapshots"]
    +target_schema: snapshots
